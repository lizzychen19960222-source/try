<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>陈玉洲｜个人名片</title>
    <meta name="description" content="陈玉洲｜AI产品经理｜微信 thisisyuhzou" />
    <link rel="stylesheet" href="./styles.css?v=1" />
  </head>
  <body>
    <main class="stage" aria-label="个人名片">
      <div class="layout" aria-label="名片内容">
        <section class="card cardProfile" aria-label="个人信息">
          <div class="top">
            <div class="avatarWrap" aria-label="头像">
              <img
                class="avatar"
                id="avatar"
                src="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20width%3D%22320%22%20height%3D%22320%22%20viewBox%3D%220%200%20320%20320%22%3E%3Cdefs%3E%3CradialGradient%20id%3D%22g%22%20cx%3D%2260%25%22%20cy%3D%2235%25%22%20r%3D%2275%25%22%3E%3Cstop%20offset%3D%220%25%22%20stop-color%3D%22%23f1f5ff%22/%3E%3Cstop%20offset%3D%22100%25%22%20stop-color%3D%22%23c8d8ff%22/%3E%3C/radialGradient%3E%3C/defs%3E%3Crect%20width%3D%22320%22%20height%3D%22320%22%20rx%3D%22160%22%20fill%3D%22url(%23g)%22/%3E%3Cpath%20d%3D%22M98%20230c14-42%2040-68%2062-68s48%2026%2062%2068%22%20fill%3D%22%23e7efff%22/%3E%3Ccircle%20cx%3D%22160%22%20cy%3D%22128%22%20r%3D%2246%22%20fill%3D%22%23e7efff%22/%3E%3Ctext%20x%3D%22160%22%20y%3D%22192%22%20text-anchor%3D%22middle%22%20font-family%3D%22Segoe%20UI%2C%20PingFang%20SC%2C%20Microsoft%20YaHei%2C%20sans-serif%22%20font-size%3D%2230%22%20fill%3D%22%23425b96%22%20opacity%3D%220.8%22%3ECYZ%3C/text%3E%3C/svg%3E"
                alt="头像"
              />
            </div>
          </div>

          <header class="heading">
            <h1 class="name" id="name">陈玉洲</h1>
            <div class="tag" id="title" aria-label="身份标签">B端产品经理</div>
          </header>

          <section class="intro" aria-label="自我介绍">
            <p id="bio">
              专注企业级产品的需求洞察与方案落地，擅长把复杂业务抽象为清晰的流程与可交付的产品体验。
            </p>
          </section>

          <section class="panel" aria-label="联系方式">
            <div class="panelHead">
              <h2 class="panelTitle">联系方式</h2>
              <div class="socialBar" id="socialBar" aria-label="社交入口"></div>
            </div>
            <ul class="contactList" id="contactList" aria-label="联系列表"></ul>
            <p class="hint" id="contactHint">点击可跳转，右侧按钮可复制</p>
          </section>
        </section>

        <section class="card cardProjects" aria-label="项目作品集">
          <header class="projectsHead">
            <h2 class="projectsTitle">Projects</h2>
            <div class="projectsMeta" id="projectsMeta">RAG · Workflow · Agent</div>
          </header>

          <section class="group" data-group="RAG" aria-label="RAG 项目">
            <div class="groupHead">
              <h3 class="groupTitle">RAG</h3>
              <button class="ghostBtn addBtn" type="button" data-add="RAG">添加项目</button>
            </div>
            <div class="projectList" id="projects-RAG"></div>
          </section>

          <section class="group" data-group="Workflow" aria-label="Workflow 项目">
            <div class="groupHead">
              <h3 class="groupTitle">Workflow</h3>
              <button class="ghostBtn addBtn" type="button" data-add="Workflow">添加项目</button>
            </div>
            <div class="projectList" id="projects-Workflow"></div>
          </section>

          <section class="group" data-group="Agent" aria-label="Agent 项目">
            <div class="groupHead">
              <h3 class="groupTitle">Agent</h3>
              <button class="ghostBtn addBtn" type="button" data-add="Agent">添加项目</button>
            </div>
            <div class="projectList" id="projects-Agent"></div>
          </section>
        </section>
      </div>

      <dialog class="dialog" id="projectDialog" aria-label="添加项目">
        <form class="dialogBody" method="dialog" id="projectForm">
          <div class="dialogHead">
            <div class="dialogTitle" id="dialogTitle">添加项目</div>
            <button class="iconBtn" type="button" data-close-dialog aria-label="关闭">×</button>
          </div>

          <input type="hidden" name="group" id="projectGroup" />

          <label class="field">
            <div class="fieldLabel">项目名称</div>
            <input class="input" type="text" name="name" id="projectName" autocomplete="off" required />
          </label>

          <label class="field">
            <div class="fieldLabel">简介</div>
            <textarea class="textarea" name="desc" id="projectDesc" rows="3" required></textarea>
          </label>

          <label class="field">
            <div class="fieldLabel">GitHub 链接</div>
            <input class="input" type="url" name="github" id="projectGithub" placeholder="https://github.com/..." required />
          </label>

          <div class="dialogActions">
            <button class="ghostBtn" value="cancel" type="submit">取消</button>
            <button class="primaryBtn" value="ok" type="submit">添加</button>
          </div>
        </form>
      </dialog>

      <div class="toast" id="toast" role="status" aria-live="polite" aria-atomic="true"></div>
    </main>
    <script src="./script.js?v=1"></script>
  </body>
</html>
